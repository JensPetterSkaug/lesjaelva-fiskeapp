<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fiskedashboard · velg elv</title>
<link rel="stylesheet" href="/styles.css?v=20260617i">
<style>
  .lp-wrap{max-width:760px;margin:0 auto;padding:48px 20px 80px}
  .lp-head{margin-bottom:28px}
  .lp-head h1{font-size:30px;letter-spacing:-0.02em;margin:8px 0 6px}
  .lp-sub{color:var(--mut);font-size:14.5px;line-height:1.6;max-width:560px}
  .lp-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px}
  a.lp-card{display:block;text-decoration:none;background:var(--panel);border:1px solid var(--line);
    border-radius:14px;padding:18px 18px 20px;transition:.14s}
  a.lp-card:hover{border-color:var(--teal-dim);transform:translateY(-2px)}
  .lp-date{display:flex;align-items:center;gap:8px;color:var(--teal);font-family:var(--mono);font-size:12px;letter-spacing:.08em;margin:0 0 14px}
  .lp-date .d{color:var(--mut);text-transform:none;letter-spacing:.02em}
  .lp-namerow{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .lp-live{display:inline-flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--teal);flex:0 0 auto}
  .lp-card .lp-name{font-size:18px;font-weight:650;color:var(--ink);letter-spacing:-0.01em}
  .lp-kind{font-size:12px;font-weight:400;color:var(--mut);margin-left:6px;letter-spacing:0}
  .lp-card .lp-region{font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-top:8px}
  .lp-card .lp-go{color:var(--mut);font-size:13px;margin-top:14px}
  a.lp-card .lp-go{color:var(--teal)}
  .lp-empty{color:var(--mut2);font-size:14px;padding:24px 0}
  /* live-status (fiskeindeks) på kortet */
  .lp-status{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;margin-top:14px;min-height:34px}
  .lp-score{font-family:var(--mono);font-size:30px;font-weight:700;line-height:1}
  .lp-sep{font-size:12px;color:var(--mut2);margin-left:-4px}
  .lp-verdict{font-size:13px;font-weight:600;line-height:1.3}
  .lp-load{font-size:12px;color:var(--mut2)}
  /* utkast: ikke klikkbart, dempet, med merke */
  .lp-card.lp-draft{opacity:.62;cursor:not-allowed}
  .lp-card.lp-draft:hover{border-color:var(--line);transform:none}
  .lp-badge{display:inline-block;margin-top:12px;font-family:var(--mono);font-size:10px;
    letter-spacing:.12em;text-transform:uppercase;color:var(--amber);
    border:1px solid rgba(224,147,90,.4);background:rgba(224,147,90,.12);border-radius:20px;padding:3px 10px}
</style>
</head>
<body>
  <div class="lp-wrap">
    <div class="lp-head">
      <p class="eyebrow">Elvefiske · live prognose · NVE Sildre + MET</p>
      <h1>Fiskedashboard</h1>
      <div class="lp-date" id="lpDate"></div>
      <p class="lp-sub">Live fiskeforhold, sesongbasert fluevalg og beste fiskested per elv. Velg elv for å åpne dashbordet.</p>
    </div>
    <div class="lp-grid" id="riverGrid"><div class="lp-empty">Laster elver …</div></div>
  </div>
  <script src="/scoring.js?v=20260617i"></script>
  <script src="/landing.js?v=20260617i"></script>
</body>
</html>
