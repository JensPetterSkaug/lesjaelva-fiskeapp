# Render Blueprint – ett-klikks deploy av Lesjaelva fiskedashboard.
# Bruk: gå til https://render.com → New → Blueprint → koble GitHub-repoet.
# Render setter $PORT selv; du fyller inn NVE_API_KEY når du blir spurt.
services:
  - type: web
    name: lesjaelva-fiskeapp
    runtime: python
    plan: free
    buildCommand: "echo 'ingen avhengigheter – kun Python stdlib'"
    startCommand: "python3 server.py"
    envVars:
      - key: HOST
        value: "0.0.0.0"
      - key: NVE_API_KEY
        sync: false          # fylles inn manuelt i Render (eksponeres aldri i repoet)
      - key: FROST_CLIENT_ID
        sync: false          # MET Frost (målte observasjoner) – valgfri
      - key: SUPABASE_URL
        sync: false          # varig lagring av prognose/observasjoner
      - key: SUPABASE_KEY
        sync: false          # Supabase service-nøkkel (sb_secret_…) – hemmelig
      - key: MET_CONTACT
        value: "jens-petter.skaug@knowit.no"
